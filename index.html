<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pajinell | Pavla Havránková</title>
<meta name="description" content="Creative Technologist. UX/UI designérka s&nbsp;frontendovým backgroundem. Nový web je na cestě.">
<link rel="icon" href="favicon.ico" sizes="48x48">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light dark;
    --bg: #FBFBFB;
    --text: #171717;
    --muted: #6C6667;
    --accent-text: #9D5C8F;
    --comp-text: #3F6C9E;
    --border: #E8E3E4;
    --photo-bg: #F7EFF5;
    --tape: rgba(190, 178, 166, 0.5);
    --tape-edge: rgba(160, 148, 136, 0.35);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #171717;
      --text: #FBFBFB;
      --muted: #9B9596;
      --accent-text: #BF7FB0;
      --comp-text: #8FB8DD;
      --border: #2C292A;
      --photo-bg: #20181E;
      --tape: rgba(251, 251, 251, 0.16);
      --tape-edge: rgba(251, 251, 251, 0.28);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100svh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 40px; padding: 40px 24px;
    background: var(--bg); color: var(--text);
    font-family: "Inter", -apple-system, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.6; text-align: center;
  }
  .photo {
    position: relative; width: min(220px, 55vw); aspect-ratio: 1;
    border-radius: 24px; background: var(--photo-bg);
  }
  .photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 24px; display: block; }
  .photo::before, .photo::after {
    content: ""; position: absolute; width: 74px; height: 32px;
    background: var(--tape); border: 1px solid var(--tape-edge);
    transform: rotate(45deg); z-index: 2;
    clip-path: polygon(0 0, 96% 0, 100% 25%, 96% 50%, 100% 75%, 96% 100%, 0 100%, 4% 75%, 0 50%, 4% 25%);
  }
  .photo::before { top: -16px; left: calc(100% - 48px); }
  .photo::after { top: calc(100% - 16px); left: -26px; }
  .caption {
    color: var(--accent-text); font-size: 13px; font-weight: 600;
    letter-spacing: 0.35em; text-transform: uppercase;
  }
  h1 { font-size: clamp(38px, 8vw, 64px); font-weight: 700; letter-spacing: -0.03em; line-height: 1.05; margin-top: 14px; }
  .subtitle { font-size: 19px; margin-top: 12px; }
  .subtitle span { color: var(--muted); }
  .wip { color: var(--muted); margin-top: 56px; }
  .wip strong { color: var(--text); font-weight: 600; }
  .links { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; }
  .links a { color: var(--comp-text); font-weight: 500; text-decoration: none; border-bottom: 1px solid var(--comp-text); padding-bottom: 2px; }
  .email { color: var(--accent-text); border-color: var(--accent-text); }
  footer { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

  <div class="photo">
    <picture>
      <source srcset="portrait-duotone-dark.jpg" media="(prefers-color-scheme: dark)">
      <img src="portrait-duotone-light.jpg" alt="Pavla Havránková" width="1200" height="1200">
    </picture>
  </div>

  <main>
    <p class="caption">Creative Technologist</p>
    <h1>Pavla Havránková</h1>
    <p class="subtitle">UX/UI designérka <span>s&nbsp;frontendovým backgroundem</span></p>
    <p class="wip"><strong>Nový web je na cestě.</strong> Právě dolaďuju detaily. Zatím mě najdete tady:</p>
  </main>

  <div class="links">
    <a class="email" href="mailto:me@pajinell.cz">me@pajinell.cz</a>
    <a href="https://www.linkedin.com/in/pajinell/" target="_blank" rel="noopener">LinkedIn</a>
    <a href="https://www.instagram.com/pajinell/" target="_blank" rel="noopener">Instagram</a>
  </div>

  <footer>© 2026 Pavla Havránková</footer>

</body>
</html>
